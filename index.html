<!DOCTYPE html>

<body>

  <div class="login-wrapper">
    <h2>Log-in</h2>
    
    <form action="login.php" method="post" name="loginForm" onsubmit="return validate()">

        <label for="username">Username:</label>
        <input type="text" name="username" id="username" placeholder="Enter username">
        <br><br>
          
        <label for="password">Password:</label>
        <input type="password" name="password" id="password" placeholder="Enter password">
        <br><br>
          
        <input type="submit" name="login" id="login" value="Login">
        <input type="reset">
        <br><br>

    </form>

  </div>

    <div class="photodiv">
    <div class="person">
        <img src="Headshots/person.jpg">

    </div>
    <div class="person">

        <p>Maximo Vedoya</p>
    </div>
    <div class="person">
        <img src="Headshots/Daria_Surmach_headshot.jpeg">
        <p>Daria Surmach</p>
    </div>
    <div class="person">

        <p>Emily Johns</p>
    </div>
    <div class="person">
        <img src="Headshots/Nikhai_Tonwar_Headshot.jpg">
        <p>Nikhai Tonwar</p>
    </div>
    <div class="person">
        <img src="Headshots/Casey_Williams_Headshot.jpg">
        <p>Casey Williams</p>
    </div>
</div>

    <script>
      function validate(){
        if(document.loginForm.username.value == "") {
          alert("Please provide your username!");
          document.loginForm.username.focus();
          return false;
        }
            
        if(document.loginForm.password.value == "") {
          alert("Please provide your password!");
          document.loginForm.password.focus();
          return false;
        }
        return true;
        }
    </script>
</body>
</html>
