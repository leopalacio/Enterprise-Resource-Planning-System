  <div align="center">
    <h2>Senior Manager Module</h2>

  <!-- added this --> 

   <div align="center" id="companyList">
    <p>Loading company data...</p>
  </div>

  <script>
    // Fetch from your PHP file
    fetch("senior_manager.php")
      .then(res => res.json())
      .then(data => {
        const div = document.getElementById("companyList");
        div.innerHTML = ""; // clear loading text

        if (data.error) {
          div.textContent = "Database connection failed.";
          return;
        }

        // Display results
        data.forEach(company => {
          const p = document.createElement("p");
          p.textContent = `${company.CompanyID}: ${company.CompanyName}`;
          div.appendChild(p);
        });
      })
      .catch(err => {
        document.getElementById("companyList").textContent = "Error fetching data.";
        console.error(err);
      });
  </script>

  

</body>
</html>
